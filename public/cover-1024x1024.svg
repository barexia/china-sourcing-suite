<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(220,38,38,0.12)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(220,38,38,0.08)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="50%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Glow circles -->
  <circle cx="850" cy="200" r="400" fill="url(#glow1)"/>
  <circle cx="200" cy="800" r="350" fill="url(#glow2)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1024" height="4" fill="url(#accent)"/>

  <!-- Badge -->
  <rect x="362" y="240" rx="100" ry="100" width="300" height="36" fill="rgba(220,38,38,0.15)" stroke="rgba(220,38,38,0.3)" stroke-width="1"/>
  <circle cx="382" cy="258" r="4" fill="#dc2626"/>
  <text x="402" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fca5a5" letter-spacing="1">COMPLETE BUNDLE · 3 GUIDES</text>

  <!-- Title -->
  <text x="512" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-1">China Sourcing</text>
  <text x="512" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="900" fill="#dc2626" text-anchor="middle" letter-spacing="-1">Suite</text>

  <!-- Subtitle -->
  <text x="512" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a1a1aa" text-anchor="middle">From 1688 and Alibaba to China's</text>
  <text x="512" y="556" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a1a1aa" text-anchor="middle">offline wholesale markets</text>

  <!-- Stats row -->
  <g transform="translate(512, 640)">
    <text x="-160" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle">138</text>
    <text x="-160" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#71717a" text-anchor="middle" letter-spacing="1">PAGES</text>

    <line x1="-80" y1="-10" x2="-80" y2="25" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle">3</text>
    <text x="0" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#71717a" text-anchor="middle" letter-spacing="1">GUIDES</text>

    <line x1="80" y1="-10" x2="80" y2="25" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <text x="160" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle">44+</text>
    <text x="160" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#71717a" text-anchor="middle" letter-spacing="1">INDUSTRY TOWNS</text>
  </g>

  <!-- Bottom bar -->
  <line x1="60" y1="880" x2="964" y2="880" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="60" y="915" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#52525b">From 1688 to <tspan fill="#a1a1aa">Factory Floors</tspan></text>

  <text x="964" y="915" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="end">$19 USD</text>
</svg>
